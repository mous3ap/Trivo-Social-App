<section>

    <div class="mt-5 pt-5 border-t border-white/5 space-y-6">
    
    

    @for (comment of commentList; track comment._id) {
        <div class="space-y-4">
        
        <div class="flex items-start gap-3 group/comment">
            <div class="shrink-0 rounded-full p-[1px] bg-white/10">
                <img [src]="comment.commentCreator.photo" [alt]="comment.commentCreator.name" class="w-8 h-8 rounded-full object-cover">
            </div>
            
            <div class="flex-1 flex flex-col items-start">
                <div class="bg-[#111335]/50 border border-white/5 rounded-2xl px-4 py-2.5 max-w-[90%]">
                    <div class="flex items-center gap-1.5 mb-1">
                        <span class="text-white text-[13px] font-semibold tracking-wide">{{comment.commentCreator.name}}</span>
                        <span class="text-gray-500 text-[11px]">@{{comment.commentCreator.username}}</span>
                    </div>
                    <p class="text-gray-300 text-[13.5px] leading-relaxed font-normal">
                        {{comment.content}}
                    </p>
                </div>
                
                <div class="flex items-center gap-3 mt-1.5 ml-2 text-[11px] text-gray-500 font-medium">
                    <span class="text-gray-600">{{comment.createdAt}}</span>
                    
                    <button class="hover:text-purple-400 transition-colors cursor-pointer flex items-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3 h-3">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6.633 10.5c.806 0 1.533-.446 2.031-1.08a9.041 9.041 0 012.861-2.4c.723-.384 1.35-.956 1.653-1.715a4.498 4.498 0 00.322-1.672V3a.75.75 0 01.75-.75A2.25 2.25 0 0116.5 4.5c0 1.152-.26 2.243-.723 3.218-.266.558.107 1.282.725 1.282h3.126c1.026 0 1.945.694 2.054 1.715.045.422.068.85.068 1.285a11.95 11.95 0 01-2.649 7.521c-.388.482-.987.729-1.605.729H13.48c-.483 0-.964-.078-1.423-.23l-3.114-1.04a4.501 4.501 0 00-1.423-.23H5.904M14.25 9h2.25M5.904 18.75c.083.205.173.405.27.602M5.904 18.75A3.375 3.375 0 111.5 15.375c0-1.04.47-1.972 1.213-2.602" />
                        </svg>
                        Like
                    </button>
                    
                    <span class="text-gray-600/60">•</span>
                    
                    <button class="hover:text-white transition-colors cursor-pointer">Reply</button>
                </div>
            </div>
        </div>

    </div>
    }

    <div class="flex items-start gap-3">
        <div class="avatar-gradient rounded-full shrink-0 shadow-[0_0_10px_rgba(168,85,247,0.15)]">
            <img [src]="userData?.photo" [alt]="userData?.name" class="w-8 h-8 rounded-full object-cover border border-[#090a1a]">
        </div>
        
        <form 
        (submit)="createComment($event)"
        class="w-full border border-white/5 rounded-2xl bg-[#0d0f2d]/40 backdrop-blur-md overflow-hidden transition-all duration-200 focus-within:border-purple-500/40 focus-within:ring-1 focus-within:ring-purple-500/20">
            <div class="px-4 py-3">
                <label for="comment" class="sr-only">Your comment</label>
                <textarea 
                    [formControl]="commentContent"
                    id="comment" 
                    rows="3" 
                    class="block w-full px-0 text-[14px] text-gray-200 bg-transparent border-0 resize-none focus:ring-0 focus:outline-none placeholder:text-gray-500 leading-relaxed" 
                    placeholder="Write a comment..." 
                    required></textarea>
            </div>
            
            <div class="flex items-center justify-between px-3 py-2 border-t border-white/5 bg-[#0a0c24]/30">
                <div class="flex items-center space-x-1 rtl:space-x-reverse">

                    <button type="button" class="p-2 text-gray-400 rounded-xl cursor-pointer hover:text-white hover:bg-white/5 transition-colors focus:outline-none">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
                        </svg>
                        <span class="sr-only">Upload image</span>
                    </button>
                </div>

                <button type="submit" class="cursor-pointer text-white bg-linear-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 font-medium tracking-wide rounded-xl text-[13px] px-4 py-1.5 shadow-lg shadow-purple-500/20 active:scale-95 transition-all focus:outline-none">
                    Post comment
                </button>
            </div>
        </form>
    </div>

</div>

</section>
