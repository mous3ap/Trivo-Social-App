<div class="min-h-screen bg-[#070814] text-[#e2e8f0] font-sans antialiased pb-12 relative overflow-hidden">
    
    <div class="absolute top-[-5%] right-[-5%] w-[500px] h-[500px] rounded-full bg-purple-900/10 blur-[150px] pointer-events-none"></div>
    <div class="absolute bottom-[10%] left-[-10%] w-[600px] h-[600px] rounded-full bg-indigo-900/10 blur-[180px] pointer-events-none"></div>

    <div class="w-full max-w-4xl mx-auto px-6 pt-6 relative z-10 mt-16">
        
        <div class="mb-6">
            <button 
            routerLink="/feed"
            class="cursor-pointer flex items-center gap-2 text-gray-400 hover:text-white text-sm font-medium px-4 py-2 rounded-xl bg-[#0d0f2d]/30 border border-white/5 backdrop-blur-md transition-all duration-200 group">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4 transform group-hover:-translate-x-0.5 transition-transform">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                </svg>
                Back to feed
            </button>
        </div>

        <div class="w-full bg-[#0d0f2d]/20 border border-white/5 rounded-[28px] backdrop-blur-xl p-6 md:p-8 shadow-2xl shadow-black/60">
            
            <div class="flex items-center justify-between border-b border-white/5 pb-6 mb-6">
                <div class="flex items-center gap-3">
                    <div class="text-purple-400 bg-purple-500/10 p-2 rounded-xl border border-purple-500/20">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0Z" />
                        </svg>
                    </div>
                    <h1 class="text-xl font-bold text-white tracking-wide">All Suggested Friends</h1>
                </div>
                <span class="px-3 py-1 rounded-full bg-white/5 border border-white/5 text-gray-400 text-xs font-bold tracking-wider">
                    {{ suggestions.length }}
                </span>
            </div>

            <div class="relative mb-8 group">
                <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-gray-500 group-focus-within:text-purple-400 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.604 10.604z" />
                    </svg>
                </div>
                <input 
                    type="text" 
                    placeholder="Search by name or username..." 
                    class="w-full bg-[#08091e]/40 border border-white/5 rounded-2xl py-3.5 pl-11 pr-4 text-sm text-white placeholder:text-gray-600 focus:outline-none focus:border-purple-500/40 focus:ring-1 focus:ring-purple-500/20 transition-all duration-200">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 ">
                
                @for (suggest of suggestions; track suggest._id) {
                    <div class="flex items-center justify-between p-4 rounded-2xl bg-[#0e1135]/30 border border-white/5 hover:border-purple-500/20 hover:bg-[#0e1135]/50 transition-all duration-300 group/card">
                    
                    <div class="flex items-center gap-3.5 ">
                        <div 
    class="w-12 h-12 rounded-full p-[1.5px] bg-white/10 group-hover/card:bg-gradient-to-tr group-hover/card:from-purple-500 group-hover/card:to-indigo-500 transition-all duration-300 shrink-0 cursor-pointer"
    
    [routerLink]="['/profile', suggest._id]"
>

    <img 
        [src]="suggest.photo" 
        [alt]="suggest.name" 
        class="w-full h-full rounded-full object-cover border-2 border-[#090a20]"
    >

</div>
                        
                        <div class="space-y-1">
                            <div>
                                <h3 
    class="text-white text-[14px] font-semibold tracking-wide leading-none cursor-pointer hover:text-purple-400 transition"
    
    [routerLink]="['/profile', suggest._id]"
>
    {{ suggest.name }}
                               </h3>
                                <span class="text-gray-500 text-[11px] font-medium block mt-2.5">@{{ suggest.username }}</span>
                            </div>
                            
                            <div class="flex items-center gap-1.5 pt-0.5">
                                <span class="px-2 py-0.5 rounded-md bg-white/5 text-gray-400 text-[10px] font-medium">{{ suggest.followersCount }} followers</span>
                                <span class="px-2 py-0.5 rounded-md bg-blue-500/10 border border-blue-500/10 text-blue-400 text-[10px] font-semibold">{{ suggest.mutualFollowersCount }} mutual</span>
                            </div>
                        </div>
                    </div>

                    <button 
                    (click)="followUser(suggest._id)"
                    [class.bg-purple-600]="!suggest.isFollowing"
                    [class.text-white]="!suggest.isFollowing"
                    [class.bg-emerald-500]="suggest.isFollowing"
                    [class.border-emerald-400]="suggest.isFollowing"
                    [class.text-white]="suggest.isFollowing"

                    class="cursor-pointer flex items-center gap-1.5 px-4 py-2 bg-purple-600/10 hover:bg-purple-600 border border-purple-500/20 hover:border-purple-500 rounded-xl text-xs font-bold text-purple-400 hover:text-white transition-all duration-300 shadow-md focus:outline-none">
                         @if (!suggest.isFollowing) {

       

        <svg xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="2.5"
        stroke="currentColor"
        class="w-3.5 h-3.5">

            <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 4.5v15m7.5-7.5h-15" />

        </svg>

        <span>Follow</span>

       

    } @else {

        

        <svg xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="2.5"
        stroke="currentColor"
        class="w-3.5 h-3.5">

            <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M4.5 12.75l6 6 9-13.5" />

        </svg>

        <span>Following</span>

       

    }

                    </button>
                </div>
                }

                

            </div>

            

        </div>

    </div>
</div>
