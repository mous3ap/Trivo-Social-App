<nav class="glass-panel glass-effect fixed top-0 z-50 w-full px-6 py-4 flex items-center justify-between">
        

       <!--------- LOGO & BRAND NAME --------->
        <div class="flex items-center gap-8  max-w-xl">
            <div class="flex items-center gap-2 cursor-pointer flex-shrink-0">
                <div class="w-7 h-7 bg-gradient-to-br from-purple-500 to-blue-500 rounded-lg flex items-center justify-center shadow-md shadow-purple-500/20">
                    <span class="text-white font-bold text-base">T</span>
                </div>
                <span class="text-white text-xl font-bold tracking-tight">Trivo</span>
            </div>



            
        </div>

        <!--------- NAVIGATION LINKS --------->
        <div class="flex items-center gap-1 lg:gap-2 h-full">
            <a 
            routerLink="/feed"
            routerLinkActive="text-white "
            #feedActive="routerLinkActive"
            class="relative font-medium px-4 py-2 flex items-center gap-2 text-gray-400 hover:text-gray-200 transition font-medium">

                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>

                <span class="hidden lg:inline">Feed</span>

                @if(feedActive.isActive){
                    <div class="absolute bottom-[-13px] left-0 right-0 h-[3px] nav-active-line rounded-full"></div>
                }

            </a>

            <a 
           routerLink="/profile"
routerLinkActive="text-white "
#profileActive="routerLinkActive"
class="relative px-4 py-2 font-medium flex items-center gap-2 text-gray-400 hover:text-gray-200 transition font-medium">

    <div class="relative">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
    </div>

    <span class="hidden lg:inline">Profile</span>

    @if(profileActive.isActive){
        <div class="absolute bottom-[-13px] left-0 right-0 h-[3px] nav-active-line rounded-full"></div>
    }

           </a>

            <a 
            routerLink="/notification"
routerLinkActive="text-white "
#notificationActive="routerLinkActive"
class="relative px-4 py-2  font-medium flex items-center gap-2 text-gray-400 hover:text-gray-200 transition">

    <div class="relative">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
        </svg>

        @if(unreadCount > 0){
            <span
            class="absolute -top-1.5 -right-2 bg-pink-500 text-[10px] text-white font-bold px-1 rounded-full min-w-[14px] h-[14px] flex items-center justify-center">
                {{ unreadCount }}
            </span>
        }
    </div>

    <span class="hidden lg:inline">Notifications</span>

    @if(notificationActive.isActive){
        <div class="absolute bottom-[-13px] left-0 right-0 h-[3px] nav-active-line rounded-full"></div>
    }

            </a>

            

            
        </div>

        <!--------- SEARCH --------->
        <div class="relative w-full max-w-sm hidden md:block">
                <span class="absolute inset-y-0 left-4 flex items-center text-gray-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </span>
                <input type="text" placeholder="Search people, tribes, or posts..." 
                    class="w-full bg-[#131531]/60 border border-white/5 rounded-full py-2 pl-12 pr-4 text-sm text-gray-200 placeholder:text-gray-500 focus:outline-none focus:ring-1 focus:ring-purple-500/30 focus:bg-[#131531]/90 transition-all">
            </div>




        <!--------- PROFILE --------->
        <div class="relative flex-shrink-0 flex justify-end">
            
            <input type="checkbox" id="profile-toggle" class="absolute inset-0 opacity-0 w-full h-full cursor-pointer z-30 peer" />
            
            <label for="profile-toggle" class="fixed inset-0 w-screen h-screen bg-transparent hidden peer-checked:block z-10 cursor-default"></label>
            
            <label for="profile-toggle" class="gradient-border-avatar rounded-full transition transform hover:scale-105 cursor-pointer z-20 block">
                <img [src]="userData?.photo || '/Gemini_Generated_Image_mh7bmpmh7bmpmh7b.png'" 
                    [alt]="userData?.name" 
                    class="w-8 h-8 rounded-full object-cover border border-[#060713]">
            </label>

            <div class="absolute right-0 top-12 w-64 glass-dropdown rounded-[24px] p-4 shadow-2xl z-20 
                        pointer-events-none opacity-0 scale-95 translate-y-[-10px]
                        peer-checked:pointer-events-auto peer-checked:opacity-100 peer-checked:scale-100 peer-checked:translate-y-0
                        transition-all duration-200 ease-out origin-top-right">
                
                <div class="flex items-center gap-3 pb-4 border-b border-white/5">
                    <div class="gradient-border-avatar rounded-full">
                        <img [src]="userData?.photo || '/Gemini_Generated_Image_mh7bmpmh7bmpmh7b.png'" 
                            [alt]="userData?.name" 
                            class="w-10 h-10 rounded-full object-cover border border-[#111229]">
                    </div>
                    <div>
                        <h4 class="text-white text-sm font-semibold">{{ userData?.name }}</h4>
                        <p class="text-gray-500 text-xs">@{{ userData?.username }}</p>
                    </div>
                </div>

                <ul class="py-3 space-y-1">
                    <li>
                        <a routerLink="/profile" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition text-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                            Profile
                        </a>
                    </li>
                    <li>
                        <a routerLink="/change-password" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition text-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724  1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37a1.724 1.724 0 002.572-1.065z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                            Settings
                        </a>
                    </li>
                 
                </ul>

                <div class="pt-2 border-t border-white/5">
                    <a (click)="logOut()" class="cursor-pointer flex items-center gap-3 px-3 py-2.5 rounded-xl text-rose-500 hover:bg-rose-500/10 transition text-sm font-medium">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                        </svg>
                        Logout
                    </a>
                </div>
            </div>
        </div>
        
    </nav>
